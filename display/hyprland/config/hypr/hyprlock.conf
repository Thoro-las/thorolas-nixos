background {
  monitor =
  path = screenshot
  blur_passes = 3
  blur_size = 4
  contrast = 1.4
  brightness = 0.6
}

# Day
label {
  monitor =
  text = cmd[update:1000] echo -e "$(date +"%A")"
  color = rgba(216, 222, 233, 0.70)
  font_size = 90
  font_family = SF Pro Display Bold
  position = 0, 350
  halign = center
  valign = center
}

# Date-Month
label {
  monitor =
  text = cmd[update:1000] echo -e "$(date +"%d %B")"
  color = rgba(216, 222, 233, 0.70)
  font_size = 40
  font_family = SF Pro Display Bold
  position = 0, 250
  halign = center
  valign = center
}

# Time
label {
  monitor =
  text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
  color = rgba(216, 222, 233, 0.70)
  font_size = 20
  font_family = SF Pro Display Bold
  position = 0, 190
  halign = center
  valign = center
}

# USER-BOX
shape {
  monitor =
  size = 300, 60
  color = rgba(255, 255, 255, .1)
  rounding = 20
  border_size = 0
  border_color = rgba(255, 255, 255, 0)
  rotate = 0
  xray = false

  position = 0, 210
  halign = center
  valign = bottom
}

# USER
label {
  monitor =
  text =   $USER
  color = rgba(216, 222, 233, 0.80)
  font_size = 18
  font_family = SF Pro Display Bold
  position = 0, 227
  halign = center
  valign = bottom
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  rounding = 20
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.4
  dots_center = true
  outer_color = rgba(255, 255, 255, 0)
  inner_color = rgba(255, 255, 255, 0.1)
  font_color = rgb(200, 200, 200)
  fade_on_empty = false
  font_family = SF Pro Display Bold
  placeholder_text = <span foreground="##ffffff33">password</span>
  hide_input = false
  position = 0, 130
  halign = center
  valign = bottom
}
